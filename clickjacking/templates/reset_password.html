{% extends 'base.html' %}
{% block title %}Reset Password — SoundNest{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 420px; margin: 3rem auto; }
  .auth-wrap h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .4rem; }
  .auth-wrap > p { color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: .9rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
<div class="auth-wrap">
  <h1>Set New Password</h1>
  <p>Choose a new password for your account. Must be at least 6 characters.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="••••••••" required autofocus minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        Update Password
      </button>
    </form>
  </div>
  <p class="auth-footer">Back to <a href="{{ url_for('login') }}">Sign In</a></p>
</div>
{% endblock %}
