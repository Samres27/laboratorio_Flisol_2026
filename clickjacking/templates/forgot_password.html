{% extends 'base.html' %}
{% block title %}Forgot Password — SoundNest{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 420px; margin: 3rem auto; }
  .auth-wrap h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .4rem; }
  .auth-wrap > p { color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: .9rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .info-box {
    background: rgba(6,214,160,.08); border: 1px solid rgba(6,214,160,.25);
    border-radius: 8px; padding: .9rem 1rem; margin-bottom: 1.5rem;
    font-size: .85rem; color: var(--accent2); font-family: 'Space Mono', monospace;
  }
</style>
<div class="auth-wrap">
  <h1>Forgot Password</h1>
  <p>Enter your username and we'll send a reset link to your recovery email.</p>
  <div class="card">
    <div class="info-box">
      🔒 The reset link expires in <strong>1 hour</strong>.
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        Send Reset Link
      </button>
    </form>
  </div>
  <p class="auth-footer">Remembered your password? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
