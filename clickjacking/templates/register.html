{% extends 'base.html' %}
{% block title %}Sign Up — SoundNest{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 460px; margin: 3rem auto; }
  .auth-wrap h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .4rem; }
  .auth-wrap p  { color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
  .auth-footer  { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: .9rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .hint { font-size: .78rem; color: var(--muted); margin-top: .3rem; font-family: 'Space Mono', monospace; }
</style>
<div class="auth-wrap">
  <h1>Create your account</h1>
  <p>Join the community and start sharing your music.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="cool_artist" required autofocus>
      </div>
      <div class="form-group">
        <label>Primary Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label>Recovery Email <span style="color:var(--accent2)">(optional)</span></label>
        <input type="email" name="recovery_email" placeholder="backup@email.com">
        <p class="hint">If left blank, your primary email will be used for account recovery.</p>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        Create Account
      </button>
    </form>
  </div>
  <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
