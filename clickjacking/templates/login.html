{% extends 'base.html' %}
{% block title %}Sign In — SoundNest{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 420px; margin: 3rem auto; }
  .auth-wrap h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .4rem; }
  .auth-wrap p  { color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
  .auth-footer  { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: .9rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .forgot-link {
    display: block; text-align: right; margin-top: .3rem;
    font-size: .8rem; color: var(--muted); text-decoration: none;
    font-family: 'Space Mono', monospace;
  }
  .forgot-link:hover { color: var(--accent); }
</style>
<div class="auth-wrap">
  <h1>Welcome back</h1>
  <p>Sign in to keep sharing your music.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
        <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot your password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        Sign In
      </button>
    </form>
  </div>
  <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up for free</a></p>
</div>
{% endblock %}
