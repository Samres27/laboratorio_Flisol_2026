{% extends "base.html" %}
{% block title %}edit post — BlogCSRF{% endblock %}

{% block content %}
<div class="page-header">
  <h1>edit post</h1>
  <p>// ID: {{ post.id }}</p>
</div>



<div class="card" style="max-width:720px">
  <form method="POST">
    <div class="form-group">
      <label>Título</label>
      <input type="text" name="title" required value="{{ post.title }}">
    </div>
    <div class="form-group">
      <label>Contenido</label>
      <textarea name="body" required>{{ post.body }}</textarea>
    </div>
    <div class="form-group">
      <div class="check-row">
        <input type="checkbox" id="published" name="published" {% if post.published %}checked{% endif %}>
        <label for="published" style="margin-bottom:0;text-transform:none;letter-spacing:0;font-size:14px">published</label>
      </div>
    </div>
    <div class="flex gap-8">
      <button type="submit" class="btn btn-primary">Actualizar</button>
      <a href="{{ url_for('posts.my_posts') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
