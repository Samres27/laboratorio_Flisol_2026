{% extends "base.html" %}
{% block title %}Nuevo post{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Nuevo post</h1>
  <p>// escritor: {{ session.username }}</p>
</div>

<div class="card" style="max-width:720px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
      <label>Título</label>
      <input type="text" name="title" required placeholder="El título de tu post…">
    </div>
    <div class="form-group">
      <label>Contenido</label>
      <textarea name="body" required placeholder="Escribe el contenido aquí…"></textarea>
    </div>
    <div class="form-group">
      <div class="check-row">
        <input type="checkbox" id="published" name="published">
        <label for="published" style="margin-bottom:0;text-transform:none;letter-spacing:0;font-size:14px">Publicar inmediatamente</label>
      </div>
    </div>
    <div class="flex gap-8">
      <button type="submit" class="btn btn-primary">Guardar post</button>
      <a href="{{ url_for('posts.my_posts') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
