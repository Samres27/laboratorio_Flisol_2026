{% extends "base.html" %}
{% block title %}New post{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New post</h1>
  <p>// writer: {{ session.username }}</p>
</div>

<div class="card" style="max-width:720px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
      <label>title</label>
      <input type="text" name="title" required placeholder="The title of your post…">
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea name="body" required placeholder="Write the content here…"></textarea>
    </div>
    <div class="form-group">
      <div class="check-row">
        <input type="checkbox" id="published" name="published">
        <label for="published" style="margin-bottom:0;text-transform:none;letter-spacing:0;font-size:14px">Publish immediately</label>
      </div>
    </div>
    <div class="flex gap-8">
      <button type="submit" class="btn btn-primary">Save post</button>
      <a href="{{ url_for('posts.my_posts') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
