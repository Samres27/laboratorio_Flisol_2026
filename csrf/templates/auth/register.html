{% extends "base.html" %}
{% block title %}Registro — BlogCSRF{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <h1>BlogCSRF</h1>
    <p>Crear cuenta de escritor</p>
  </div>

  <div class="card">
    <!-- VULNERABLE: sin token CSRF -->
    <form method="POST">
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input type="text" name="username" required autocomplete="off" placeholder="escritor_01">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="mínimo 4 caracteres">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Crear cuenta</button>
    </form>
  </div>

  <p class="text-muted mt-24" style="text-align:center">
    ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="color:var(--accent)">Inicia sesión</a>
  </p>
</div>
{% endblock %}
