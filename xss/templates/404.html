{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}

<div class="container py-5 text-center">
    <h1 style="font-size: 6rem; font-weight:700; color:#333;">404</h1>
    <h3 class="mb-3">Page Not Found</h3>
    
    <div class="alert alert-warning d-inline-block mt-3" role="alert">
        {{ message|safe }}
    </div>
    <br><br>
    <a href="/" class="btn btn-dark px-4">Go Home</a>
</div>

{% endblock %}
