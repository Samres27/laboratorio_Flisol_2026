<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Shop{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .navbar { background: #fff; border-bottom: 1px solid #eee; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; color: #000 !important; letter-spacing: 2px; }
        .nav-link { color: #333 !important; font-size: 0.9rem; }
        .nav-link:hover { color: #000 !important; }
        footer { background: #222; color: #aaa; padding: 30px 0; margin-top: 60px; text-align: center; font-size: 0.85rem; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <a class="navbar-brand" href="/"><b>D</b>JANGO SHOP</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/shop/">Shop</a></li>
            <li class="nav-item"><a class="nav-link" href="/chat/">Chat</a></li>
        </ul>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <p>&copy; 2024 Django Shop — Security Lab</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
