{% extends "base.html" %}
{% block title %}Admin — VulnMail{% endblock %}
{% block content %}
<div class="card">
  <h1>Panel admin</h1>
  <p class="subtitle">Acceso restringido</p>
  {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
  {% endfor %}
  <form method="POST">
    <label>Usuario admin</label>
    <input type="text" name="username" placeholder="admin@vulnlab.bo" required autocomplete="off"/>
    <label>Contraseña</label>
    <input type="password" name="password" required/>
    <button type="submit" class="btn btn-full">Ingresar</button>
  </form>
  <a href="{{ url_for('user_login') }}" class="link">← Volver al <span>webmail</span></a>
</div>
{% endblock %}
