<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}VulnMail{% endblock %}</title>
  <style>
    :root {
      --bg:          #f6f8fa;
      --surface:     #ffffff;
      --border:      #d0d7de;
      --text:        #1f2328;
      --muted:       #656d76;
      --accent:      #0969da;
      --accent-hover:#0550ae;
      --success:     #1a7f37;
      --error:       #cf222e;
      --error-bg:    #fff0f0;
      --success-bg:  #f0fff4;
      --radius:      6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; }

    .nav-user {
      font-size: 13px;
      color: var(--muted);
      padding: 0 10px 0 0;
      border-right: 1px solid var(--border);
      margin-right: 4px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: var(--radius);
      transition: background .12s, color .12s;
    }
    .nav-links a:hover { background: var(--bg); color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 600; }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 440px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    /* ── Forms ── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input[type="email"], input[type="password"],
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea { resize: vertical; min-height: 140px; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(9,105,218,.12);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 16px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background .12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn-full  { width: 100%; }
    .btn-sm    { padding: 4px 12px; font-size: 12px; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg); }

    .btn-danger {
      background: var(--surface);
      color: var(--error);
      border-color: var(--border);
    }
    .btn-danger:hover { background: var(--error-bg); border-color: #f5c0c3; }

    /* ── Alerts ── */
    .flash-msg {
      padding: 10px 14px;
      margin-bottom: 14px;
      border-radius: var(--radius);
      font-size: 13px;
      border: 1px solid;
    }
    .flash-success { border-color: #9ddcb3; color: var(--success); background: var(--success-bg); }
    .flash-error   { border-color: #f5c0c3; color: var(--error);   background: var(--error-bg); }

    /* ── Link ── */
    .link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .link span { color: var(--accent); }
    .link:hover span { text-decoration: underline; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card, .inbox-wrap, .compose-wrap, .admin-wrap, .msg-wrap {
      animation: fadeIn .18s ease;
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="logo">VulnMail</a>
  <div class="nav-links">
    {% if session.user_email %}
      <span class="nav-user">{{ session.user_email }}</span>
      <a href="{{ url_for('inbox') }}"   class="{% if request.endpoint == 'inbox'   %}active{% endif %}">Bandeja</a>
      <a href="{{ url_for('compose') }}" class="{% if request.endpoint == 'compose' %}active{% endif %}">Redactar</a>
      <a href="{{ url_for('logout') }}">Salir</a>
    {% elif session.is_admin %}
      <a href="{{ url_for('admin') }}">Panel admin</a>
      <a href="{{ url_for('admin_logout') }}">Salir</a>
    {% else %}
      <a href="{{ url_for('user_login') }}">Iniciar sesión</a>
      <a href="{{ url_for('register') }}">Registrarse</a>
      <a href="{{ url_for('admin_login') }}" style="color:#bbb; font-size:12px">admin</a>
    {% endif %}
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
