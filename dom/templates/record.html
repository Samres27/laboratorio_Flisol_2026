{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="wrapper">
  <div class="form-box" style="max-width:500px;">
    <h2 class="form-title">Create Account</h2>
    <form method="POST">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:.7rem;">Create account</button>
    </form>
    <div class="form-footer" style="margin-top:1.2rem;">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
