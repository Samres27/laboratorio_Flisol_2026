{% extends 'base.html' %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="wrapper">
  <div class="form-box">
    <h2 class="form-title">Log In</h2>
    <form method="POST">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:.7rem;">Log in</button>
    </form>
    <div class="form-footer" style="margin-top:1.2rem;">
      Don't have an account? <a href="{{ url_for('record') }}">Sign up</a>
    </div>
    
  </div>
</div>
{% endblock %}
